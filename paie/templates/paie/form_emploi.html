{% extends "pilotage/base_pilotage.html" %}
{% block titre %}Modifier l'emploi{% endblock %}
{% block contenu %}
<div class="p-6 max-w-xl">
    <a href="{% url 'paie_emplois' %}" class="text-sm text-gray-500 hover:text-[#C81E6E]">← Retour aux emplois</a>
    <div class="mt-4 mb-6"><h1 class="text-2xl font-bold text-gray-800">Modifier l'emploi</h1></div>
    <form method="post" class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
        {% csrf_token %}
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Code emploi</label>{{ form.code }}</div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Libellé</label>{{ form.libelle }}</div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">Ordre d'affichage</label>{{ form.ordre }}</div>
        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="bg-[#C81E6E] text-white font-medium px-6 py-2.5 rounded-lg hover:bg-[#a81759] transition">Enregistrer</button>
            <a href="{% url 'paie_emplois' %}" class="text-gray-500 hover:text-gray-700">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
