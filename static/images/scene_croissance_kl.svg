<svg width="600" height="460" viewBox="0 0 600 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration croissance et réussite">
  <defs>
    <linearGradient id="rose3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C81E6E"/>
      <stop offset="1" stop-color="#8E1450"/>
    </linearGradient>
    <linearGradient id="dark3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F2128"/>
      <stop offset="1" stop-color="#16171C"/>
    </linearGradient>
    <linearGradient id="light3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4C0D1"/>
      <stop offset="1" stop-color="#ED93B1"/>
    </linearGradient>
  </defs>

  <circle cx="300" cy="220" r="200" fill="#FCEEF3"/>
  <ellipse cx="300" cy="400" rx="220" ry="24" fill="#F4C0D1" opacity="0.5"/>

  <!-- Marches de croissance -->
  <g transform="translate(150 200)">
    <rect x="0"   y="120" width="70" height="60"  rx="8" fill="url(#light3)"/>
    <rect x="80"  y="80"  width="70" height="100" rx="8" fill="#ED93B1"/>
    <rect x="160" y="40"  width="70" height="140" rx="8" fill="url(#rose3)"/>
    <!-- Personnage qui gravit (au sommet) -->
    <g transform="translate(178 -50)">
      <rect x="10" y="40" width="36" height="48" rx="12" fill="url(#dark3)"/>
      <circle cx="28" cy="24" r="18" fill="#8D5524"/>
      <path d="M11 22 a17 17 0 0 1 34 0 q-17 -12 -34 0 Z" fill="#1A1A1A"/>
      <!-- Bras levé -->
      <rect x="40" y="40" width="10" height="26" rx="5" fill="url(#dark3)" transform="rotate(35 45 53)"/>
    </g>
  </g>

  <!-- Fusée / objectif atteint -->
  <g transform="translate(400 110)">
    <path d="M40 0 C58 14 64 40 60 64 L20 64 C16 40 22 14 40 0 Z" fill="#FFFFFF" stroke="#FBE0EB" stroke-width="2"/>
    <circle cx="40" cy="32" r="12" fill="url(#rose3)"/>
    <path d="M20 64 L8 80 L26 72 Z" fill="#C81E6E"/>
    <path d="M60 64 L72 80 L54 72 Z" fill="#C81E6E"/>
    <!-- Flammes -->
    <path d="M32 64 q8 24 8 30 q-8 -6 -8 -30 Z" fill="#ED93B1"/>
    <path d="M48 64 q-8 24 -8 30 q8 -6 8 -30 Z" fill="#F4C0D1"/>
  </g>

  <!-- Drapeau au sommet -->
  <g transform="translate(360 70)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#16171C" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 2 L34 12 L0 24 Z" fill="url(#rose3)"/>
  </g>

  <!-- Étoiles de réussite -->
  <g fill="#C81E6E">
    <path d="M120 120 l4 9 l10 1 l-7 7 l2 10 l-9 -5 l-9 5 l2 -10 l-7 -7 l10 -1 Z"/>
  </g>
  <g fill="#ED93B1">
    <path d="M500 280 l3 7 l8 1 l-6 5 l2 8 l-7 -4 l-7 4 l2 -8 l-6 -5 l8 -1 Z"/>
  </g>

  <circle cx="110" cy="200" r="5" fill="#C81E6E"/>
  <circle cx="510" cy="180" r="5" fill="#ED93B1"/>
  <circle cx="300" cy="80" r="4" fill="#F4C0D1"/>
</svg>
