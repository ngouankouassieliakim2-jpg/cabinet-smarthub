<svg width="600" height="460" viewBox="0 0 600 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration rendez-vous et conseil">
  <defs>
    <linearGradient id="rose2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C81E6E"/>
      <stop offset="1" stop-color="#8E1450"/>
    </linearGradient>
    <linearGradient id="dark2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F2128"/>
      <stop offset="1" stop-color="#16171C"/>
    </linearGradient>
  </defs>

  <circle cx="300" cy="220" r="200" fill="#FCEEF3"/>
  <ellipse cx="300" cy="400" rx="220" ry="24" fill="#F4C0D1" opacity="0.5"/>

  <!-- Grand calendrier -->
  <g transform="translate(180 110)">
    <rect x="0" y="0" width="240" height="220" rx="18" fill="#FFFFFF" stroke="#FBE0EB" stroke-width="2"/>
    <!-- Bandeau -->
    <path d="M0 18 a18 18 0 0 1 18 -18 h204 a18 18 0 0 1 18 18 v34 h-240 Z" fill="url(#rose2)"/>
    <rect x="48" y="-10" width="10" height="30" rx="5" fill="#8E1450"/>
    <rect x="182" y="-10" width="10" height="30" rx="5" fill="#8E1450"/>
    <!-- Titre mois -->
    <rect x="80" y="20" width="80" height="12" rx="6" fill="#FFFFFF" opacity="0.8"/>
    <!-- Grille de jours -->
    <g fill="#E8EAED">
      <rect x="24"  y="70"  width="26" height="22" rx="5"/>
      <rect x="60"  y="70"  width="26" height="22" rx="5"/>
      <rect x="96"  y="70"  width="26" height="22" rx="5"/>
      <rect x="132" y="70"  width="26" height="22" rx="5"/>
      <rect x="168" y="70"  width="26" height="22" rx="5"/>
      <rect x="24"  y="104" width="26" height="22" rx="5"/>
      <rect x="60"  y="104" width="26" height="22" rx="5"/>
      <rect x="96"  y="104" width="26" height="22" rx="5"/>
      <rect x="168" y="104" width="26" height="22" rx="5"/>
      <rect x="24"  y="138" width="26" height="22" rx="5"/>
      <rect x="60"  y="138" width="26" height="22" rx="5"/>
      <rect x="132" y="138" width="26" height="22" rx="5"/>
      <rect x="168" y="138" width="26" height="22" rx="5"/>
    </g>
    <!-- Jour sélectionné -->
    <rect x="132" y="104" width="26" height="22" rx="5" fill="url(#rose2)"/>
    <circle cx="145" cy="115" r="3" fill="#FFFFFF"/>
    <!-- Pastille de confirmation -->
    <circle cx="200" cy="150" r="26" fill="#FFFFFF" stroke="#C81E6E" stroke-width="3"/>
    <path d="M189 150 l7 7 l15 -16" stroke="#C81E6E" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Horloge flottante -->
  <g transform="translate(420 250)">
    <circle cx="40" cy="40" r="40" fill="url(#dark2)"/>
    <circle cx="40" cy="40" r="40" fill="none" stroke="#C81E6E" stroke-width="3"/>
    <line x1="40" y1="40" x2="40" y2="18" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="56" y2="46" stroke="#ED93B1" stroke-width="3" stroke-linecap="round"/>
    <circle cx="40" cy="40" r="4" fill="#FFFFFF"/>
  </g>

  <!-- Cloche de notification -->
  <g transform="translate(110 250)">
    <circle cx="34" cy="34" r="34" fill="#FFFFFF" stroke="#FBE0EB" stroke-width="2"/>
    <path d="M34 16 a12 12 0 0 1 12 12 v8 l4 6 h-32 l4 -6 v-8 a12 12 0 0 1 12 -12 Z" fill="#C81E6E"/>
    <circle cx="34" cy="50" r="4" fill="#C81E6E"/>
    <circle cx="50" cy="20" r="7" fill="#ED93B1"/>
  </g>

  <circle cx="130" cy="150" r="5" fill="#C81E6E"/>
  <circle cx="490" cy="170" r="5" fill="#ED93B1"/>
  <circle cx="470" cy="360" r="4" fill="#F4C0D1"/>
</svg>
