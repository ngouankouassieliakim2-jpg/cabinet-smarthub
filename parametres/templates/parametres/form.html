<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ titre }}</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  input[type=text], input[type=number], input[type=date], select, textarea {
    width:100%; border:1px solid #d1d5db; border-radius:6px; padding:8px 10px; font-size:14px; margin-top:4px;
  }
  label { font-size:13px; font-weight:600; color:#374151; }
  form p { margin-bottom:14px; }
  .helptext { font-size:11px; color:#9ca3af; display:block; margin-top:2px; }
</style>
</head>
<body class="bg-gray-100 min-h-screen">

<nav class="bg-[#16171C] text-white px-6 py-3 flex items-center gap-6">
  <span class="font-bold">Cabinet K&amp;L</span>
  <a href="{% url 'liste_devis' %}" class="text-sm text-gray-300 hover:text-white">Devis</a>
  <a href="{% url 'catalogue' %}" class="text-sm text-white font-medium border-b-2 border-[#C81E6E] pb-0.5">Paramètres</a>
</nav>

<div class="max-w-2xl mx-auto p-6">
  <a href="{% url 'catalogue' %}" class="text-sm text-gray-500 hover:underline">&larr; Retour au catalogue</a>
  <div class="bg-white rounded-lg shadow p-6 mt-3">
    <h1 class="text-xl font-bold text-gray-800 mb-5">{{ titre }}</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="flex gap-3 mt-6 pt-4 border-t">
        <button type="submit" class="bg-[#C81E6E] text-white px-5 py-2 rounded font-medium hover:bg-[#a81659]">Enregistrer</button>
        <a href="{% url 'catalogue' %}" class="bg-gray-200 text-gray-700 px-5 py-2 rounded font-medium hover:bg-gray-300">Annuler</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
