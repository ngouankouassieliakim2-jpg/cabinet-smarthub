{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Modifier {{ devis.numero_devis }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

<div class="max-w-3xl mx-auto">
    <a href="{% url 'detail_devis' devis.id %}" class="text-blue-700 hover:underline">&larr; Retour au devis</a>

    <div class="bg-white shadow rounded-lg p-6 mt-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Modifier {{ devis.numero_devis }}</h1>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="space-y-4">
                {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-600 text-xs mt-1">{{ field.errors|striptags }}</p>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

            <div class="mt-6 flex gap-3">
                <button type="submit" class="bg-blue-700 text-white px-6 py-2 rounded hover:bg-blue-800">Enregistrer</button>
                <a href="{% url 'detail_devis' devis.id %}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded hover:bg-gray-300">Annuler</a>
            </div>
        </form>
    </div>
</div>

<style>
    input, select, textarea {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
    }
</style>
<script src="{% static 'devis/devis_form.js' %}"></script>
</body>
</html>
