{% extends "pilotage/base_pilotage.html" %}

{% block contenu %}
<div class="min-h-screen bg-slate-50 p-6 text-slate-900 lg:p-10">
    <div class="mx-auto max-w-3xl">
        <section class="rounded-[28px] border border-slate-200 bg-gradient-to-br from-white via-[#FCEEF3]/30 to-white p-6 shadow-sm">
            <div class="inline-flex items-center rounded-full bg-[#C81E6E]/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-[#C81E6E]">Validation</div>
            <h1 class="mt-3 text-2xl font-semibold tracking-tight text-slate-900">{{ depense.numero_depense }}</h1>
            <p class="mt-2 text-sm text-slate-500">{{ depense.fournisseur }} — {{ depense.montant_ttc }} FCFA — Niveau requis : {{ depense.get_niveau_requis_display }}</p>
            <div class="mt-6 flex flex-col gap-3 lg:flex-row">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" name="valider" value="1" class="inline-flex items-center justify-center rounded-full bg-emerald-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700">Valider</button>
                </form>
                <form method="post">
                    {% csrf_token %}
                    {{ rejet_form.as_p }}
                    <button type="submit" name="rejeter" value="1" class="inline-flex items-center justify-center rounded-full bg-rose-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-rose-700">Rejeter</button>
                </form>
            </div>
        </section>
    </div>
</div>
{% endblock %}
