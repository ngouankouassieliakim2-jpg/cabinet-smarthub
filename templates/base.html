{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="{% static 'manifest.json' %}">
<meta name="theme-color" content="#C81E6E">
<link rel="apple-touch-icon" href="{% static 'images/icone-192.png' %}">
<title>{% block titre %}Cabinet K&L{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
{% block style %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen">
  <nav class="bg-[#16171C] text-white px-6 py-2.5 flex items-center gap-6 sticky top-0 z-50 flex-wrap">
    <a href="{% url 'liste_devis' %}" class="shrink-0 flex items-center">
      <span class="bg-white rounded p-1 flex items-center">
        <img src="{% static 'images/LOGO_2025_KL_fne.PNG' %}" alt="Cabinet K&L" class="h-7 w-auto">
      </span>
    </a>
    <div class="flex items-center gap-5 text-sm flex-wrap">
      <a href="{% url 'liste_devis' %}" class="{% if actif == 'devis' %}text-white font-medium border-b-2 border-[#C81E6E] pb-0.5{% else %}text-gray-300 hover:text-white{% endif %}">Devis</a>
      <a href="#" title="Bientôt disponible" class="{% if actif == 'clients' %}text-white font-medium border-b-2 border-[#C81E6E] pb-0.5{% else %}text-gray-400 hover:text-white{% endif %}">Clients</a>
      <a href="/paie/" class="{% if actif == 'paie' %}text-white font-medium border-b-2 border-[#C81E6E] pb-0.5{% else %}text-gray-300 hover:text-white{% endif %}">Paie</a>
      <a href="{% url 'catalogue' %}" class="{% if actif == 'parametres' %}text-white font-medium border-b-2 border-[#C81E6E] pb-0.5{% else %}text-gray-300 hover:text-white{% endif %}">Paramètres</a>
    </div>
  </nav>
  {% block contenu %}{% endblock %}
  <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register("{% static 'service-worker.js' %}");
        }
    </script>
</body>
</html>
