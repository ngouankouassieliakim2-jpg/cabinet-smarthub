{% comment %}Breadcrumb trail component{% endcomment %}
<nav class="text-xs text-slate-500" aria-label="Breadcrumb">
  <ol class="flex flex-wrap items-center gap-2">
    {% for item in items %}
      <li class="flex items-center gap-2">
        {% if item.url %}<a href="{{ item.url }}" class="hover:text-[#C81E6E] transition">{{ item.label }}</a>{% else %}<span class="text-slate-500">{{ item.label }}</span>{% endif %}
        {% if not forloop.last %}<span class="text-slate-400">›</span>{% endif %}
      </li>
    {% endfor %}
  </ol>
</nav>
