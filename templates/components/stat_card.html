{% comment %}KPI card for metrics and indicators{% endcomment %}
<div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm {{ extra_classes|default:"" }}">
  <div class="flex items-start justify-between gap-4">
    <div>
      <p class="text-xs font-semibold uppercase tracking-widest text-slate-500">{{ title }}</p>
      <p class="mt-3 text-3xl font-black text-slate-900">
        {{ value }}{% if unit %}<span class="text-base font-semibold text-slate-500"> {{ unit }}</span>{% endif %}
      </p>
      {% if delta %}
      <p class="mt-2 text-sm font-medium text-slate-500">{{ delta }}</p>
      {% endif %}
    </div>
    {% if icon %}
    <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-[#FCEEF3] text-[#C81E6E]">{{ icon }}</div>
    {% endif %}
  </div>
</div>
