{% comment %}Modal shell component; content is inserted and display controlled by JavaScript{% endcomment %}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/50 p-4 opacity-0 pointer-events-none transition-all duration-200" id="{{ id }}-backdrop">
  <div class="w-full max-w-2xl overflow-hidden rounded-[2rem] bg-white shadow-2xl ring-1 ring-slate-200">
    <div class="flex items-center justify-between border-b border-slate-200 px-6 py-5">
      <div>
        <h2 class="text-xl font-semibold text-slate-900">{{ title }}</h2>
        {% if description %}<p class="mt-1 text-sm text-slate-500">{{ description }}</p>{% endif %}
      </div>
      <button type="button" class="text-slate-400 transition hover:text-slate-700" aria-label="Fermer" data-modal-close="{{ id }}">×</button>
    </div>
    <div class="p-6">{{ content }}</div>
  </div>
</div>
