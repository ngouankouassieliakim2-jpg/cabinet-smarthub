{% comment %}Form container with common spacing and styling{% endcomment %}
<div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm {{ extra_classes|default:"" }}">
  {% if title %}
  <div class="mb-5">
    <h2 class="text-xl font-bold text-slate-900">{{ title }}</h2>
    {% if subtitle %}
    <p class="mt-2 text-sm text-slate-500">{{ subtitle }}</p>
    {% endif %}
  </div>
  {% endif %}
  <div class="space-y-6">{{ content }}</div>
</div>
