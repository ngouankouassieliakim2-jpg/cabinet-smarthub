{% comment %}Responsive table component with optional header actions{% endcomment %}
<div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50 text-left text-xs uppercase tracking-widest text-slate-500">
        <tr>
          {% for column in columns %}
          <th scope="col" class="px-4 py-3 {{ column.align|default:'text-left' }}">{{ column.label }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-200 bg-white">
        {% for row in rows %}
        <tr class="hover:bg-slate-50 transition-colors">
          {% for cell in row %}
            <td class="px-4 py-4 {{ cell.align|default:'text-left' }}">{{ cell.value }}</td>
          {% endfor %}
        </tr>
        {% empty %}
        <tr>
          <td class="px-4 py-8 text-center text-sm text-slate-500" colspan="{{ columns|length }}">{{ empty_text|default:'Aucune donnée disponible.' }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
