{% extends "pilotage/base_pilotage.html" %}
{% block titre %}Créer un collaborateur{% endblock %}
{% block contenu %}
<div class="mx-auto max-w-3xl p-6">
    <section class="rounded-[28px] border border-slate-200 bg-gradient-to-br from-white via-[#FCEEF3]/30 to-white p-6 shadow-sm">
        <div class="inline-flex items-center rounded-full bg-[#C81E6E]/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-[#C81E6E]">Pilotage</div>
        <h1 class="mt-3 text-2xl font-bold text-slate-900">Créer un collaborateur</h1>
        <p class="mt-2 text-sm text-slate-500">Créez un compte interne destiné à la Direction, aux Cadres ou aux Collaborateurs.</p>
    </section>

    <form method="post" class="mt-6 space-y-5 rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm">
        {% csrf_token %}
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <label class="space-y-1 text-sm text-slate-700">
                <span>Prénom</span>
                <input type="text" name="prenom" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]" required>
            </label>
            <label class="space-y-1 text-sm text-slate-700">
                <span>Nom</span>
                <input type="text" name="nom" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]" required>
            </label>
        </div>
        <label class="space-y-1 text-sm text-slate-700">
            <span>Email</span>
            <input type="email" name="email" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]" required>
        </label>
        <label class="space-y-1 text-sm text-slate-700">
            <span>Rôle</span>
            <select name="role" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]">
                {% for valeur, label in roles %}
                <option value="{{ valeur }}">{{ label }}</option>
                {% endfor %}
            </select>
        </label>
        <div>
            <label class="mb-1 block text-sm font-semibold text-slate-700">Poste occupé</label>
            <input type="text" name="poste" placeholder="Ex : Comptable senior" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]">
        </div>
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div>
                <label class="mb-1 block text-sm font-semibold text-slate-700">Type de contrat</label>
                <select name="contrat" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]">
                    <option value="CDI">CDI</option>
                    <option value="CDD">CDD</option>
                    <option value="STAGE">Stage</option>
                </select>
            </div>
            <div>
                <label class="mb-1 block text-sm font-semibold text-slate-700">Date d'entrée</label>
                <input type="date" name="date_entree" required class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]">
            </div>
        </div>
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div>
                <label class="mb-1 block text-sm font-semibold text-slate-700">Pôle</label>
                <select name="pole" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]">
                    <option value="">— Aucun —</option>
                    {% for p in poles %}
                    <option value="{{ p.id }}">{{ p.nom }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="mb-1 block text-sm font-semibold text-slate-700">Poste (organigramme)</label>
                <select name="poste_organigramme" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]">
                    <option value="">— Aucun —</option>
                    {% for ps in postes %}
                    <option value="{{ ps.id }}">{{ ps.intitule }} ({{ ps.pole.nom }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="flex items-center justify-between gap-3">
            <a href="{% url 'pilotage_collaborateurs_liste' %}" class="text-sm text-slate-600 hover:text-slate-900">Retour à la liste</a>
            <button type="submit" class="rounded-full bg-[#C81E6E] px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-[#a81759]">Créer</button>
        </div>
    </form>
</div>
{% endblock %}
