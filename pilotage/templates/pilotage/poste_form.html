{% extends "pilotage/base_pilotage.html" %}
{% block titre %}{{ titre_page }}{% endblock %}
{% block contenu %}
<div class="mx-auto max-w-xl p-6">
    <section class="rounded-[28px] border border-slate-200 bg-gradient-to-br from-white via-[#FCEEF3]/30 to-white p-6 shadow-sm">
        <div class="inline-flex items-center rounded-full bg-[#C81E6E]/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-[#C81E6E]">Pilotage</div>
        <h1 class="mt-3 text-2xl font-bold text-slate-900">{{ titre_page }}</h1>
        <p class="mt-2 text-sm text-slate-500">Structurer l’organigramme et les relations entre postes.</p>
    </section>
    <form method="post" class="mt-6 space-y-4 rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm">
        {% csrf_token %}
        <div>
            <label class="mb-1 block text-sm font-semibold text-slate-700">Intitulé du poste</label>
            <input type="text" name="intitule" value="{{ poste.intitule|default:'' }}" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]">
        </div>
        <div>
            <label class="mb-1 block text-sm font-semibold text-slate-700">Pôle</label>
            <select name="pole" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]">
                <option value="">— Choisir un pôle —</option>
                {% for pole in poles %}
                <option value="{{ pole.id }}" {% if pole.id == poste.pole_id %}selected{% endif %}>{{ pole.nom }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="mb-1 block text-sm font-semibold text-slate-700">Poste parent</label>
            <select name="poste_parent" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]">
                <option value="">— Aucun —</option>
                {% for option in postes_parents %}
                <option value="{{ option.id }}" {% if option.id == poste.poste_parent_id %}selected{% endif %}>{{ option.intitule }} ({{ option.pole.nom }})</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="mb-1 block text-sm font-semibold text-slate-700">Collaboration</label>
            <textarea name="commentaires" rows="3" class="w-full rounded-xl border border-slate-200 bg-slate-50/60 px-3 py-2.5 text-sm shadow-sm focus:border-[#C81E6E] focus:outline-none focus:ring-1 focus:ring-[#C81E6E]">{{ poste.commentaires|default:'' }}</textarea>
        </div>
        <div class="flex items-center justify-between gap-3 pt-2">
            <a href="{% url 'pilotage_postes_liste' %}" class="text-sm text-slate-600 hover:text-slate-900">← Retour aux postes</a>
            <button type="submit" class="rounded-full bg-[#C81E6E] px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-[#a81759]">Enregistrer</button>
        </div>
    </form>
</div>
{% endblock %}
