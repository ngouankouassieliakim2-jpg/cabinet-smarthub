{% extends "pilotage/base_pilotage.html" %}
{% block titre %}{{ titre_page }}{% endblock %}
{% block contenu %}
<div class="max-w-xl mx-auto p-6">
    <a href="{% url 'pilotage_postes_liste' %}" class="text-sm text-gray-500 hover:text-[#C81E6E]">← Retour aux postes</a>
    <h1 class="text-xl font-bold text-gray-800 mt-3 mb-6">{{ titre_page }}</h1>
    <form method="post" class="bg-white border border-gray-200 rounded-xl p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="text-sm font-semibold text-gray-700 block mb-1">Intitulé du poste</label>
            <input type="text" name="intitule" value="{{ poste.intitule|default:'' }}" class="w-full border border-gray-300 rounded-lg p-2 text-sm">
        </div>
        <div>
            <label class="text-sm font-semibold text-gray-700 block mb-1">Pôle</label>
            <select name="pole" class="w-full border border-gray-300 rounded-lg p-2 text-sm">
                <option value="">— Choisir un pôle —</option>
                {% for pole in poles %}
                <option value="{{ pole.id }}" {% if pole.id == poste.pole_id %}selected{% endif %}>{{ pole.nom }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="text-sm font-semibold text-gray-700 block mb-1">Poste parent</label>
            <select name="poste_parent" class="w-full border border-gray-300 rounded-lg p-2 text-sm">
                <option value="">— Aucun —</option>
                {% for option in postes_parents %}
                <option value="{{ option.id }}" {% if option.id == poste.poste_parent_id %}selected{% endif %}>{{ option.intitule }} ({{ option.pole.nom }})</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="text-sm font-semibold text-gray-700 block mb-1">Collaboration</label>
            <textarea name="commentaires" rows="3" class="w-full border border-gray-300 rounded-lg p-2 text-sm">{{ poste.commentaires|default:'' }}</textarea>
        </div>
        <button type="submit" class="w-full bg-[#C81E6E] text-white font-medium py-2.5 rounded-lg hover:bg-[#a81759]">Enregistrer</button>
    </form>
</div>
{% endblock %}
