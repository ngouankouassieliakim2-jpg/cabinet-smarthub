{% if profondeur < 15 %}
<div class="pl-4 border-l-2 border-slate-200 ml-2">
    <div class="bg-white border border-gray-200 rounded-lg px-4 py-2 my-2 inline-block shadow-sm">
        <p class="font-semibold text-gray-800 text-sm">{{ poste.intitule }}</p>
        <p class="text-xs text-gray-500">{{ poste.pole.nom }}</p>
    </div>
    {% for enfant in poste.postes_subordonnes.all %}
        {% include "pilotage/_organigramme_noeud.html" with poste=enfant profondeur=profondeur|add:1 %}
    {% endfor %}
</div>
{% endif %}
