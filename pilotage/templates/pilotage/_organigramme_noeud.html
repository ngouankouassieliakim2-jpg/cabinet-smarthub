{% if profondeur < 15 %}
<div class="ml-2 border-l-2 border-slate-200 pl-4">
    <div class="my-2 inline-block rounded-2xl border border-slate-200 bg-white px-4 py-2 shadow-sm">
        <p class="text-sm font-semibold text-slate-800">{{ poste.intitule }}</p>
        <p class="text-xs text-slate-500">{{ poste.pole.nom }}</p>
    </div>
    {% for enfant in poste.postes_subordonnes.all %}
        {% include "pilotage/_organigramme_noeud.html" with poste=enfant profondeur=profondeur|add:1 %}
    {% endfor %}
</div>
{% endif %}
